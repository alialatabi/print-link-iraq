project_id = "pvxgftjfefhtyanthfne"

# 4-week (28d) inactivity window. The hosted project is on the free plan, where
# server-side session timeouts are unavailable (Pro+ only), so the window is
# enforced CLIENT-SIDE in src/contexts/AuthContext.tsx. This block documents the
# intended value and applies if/when the project moves to Pro and config is
# pushed (or set it in dashboard → Authentication → Sessions → Inactivity timeout).
[auth.sessions]
inactivity_timeout = "672h"

[functions.send-otp]
verify_jwt = false

[functions.verify-otp]
verify_jwt = false

# Reads Authorization, validates the caller's JWT internally, then OTP-gates a phone change.
[functions.update-phone]
verify_jwt = false

[functions.phone-login]
verify_jwt = false

# Authenticated: sets the caller's 6-digit PIN as their account password (after OTP verify).
[functions.set-pin]
verify_jwt = true

[functions.send-to-telegram]
verify_jwt = false

[functions.create-admin]
verify_jwt = false

[functions.admin-delete-user]
verify_jwt = false

[functions.create-designer]
verify_jwt = false

[functions.create-reseller]
verify_jwt = false

[functions.generate-sitemap]
verify_jwt = false

[functions.ai-design-generate]
verify_jwt = false

# Does its own admin-JWT check internally (reads Authorization, verifies user + admin role).
[functions.sync-alwaseet-locations]
verify_jwt = false

# Authenticated customers only: lists/validates coupons; also validates the caller's JWT internally.
[functions.validate-coupon]
